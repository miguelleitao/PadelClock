<!DOCTYPE html>
<html>
    <head>
        <title>PadelClock</title>
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <link rel="manifest" href="manifest.json">
    </head>
    <style>
        table { width: 100%; }
		.gp_slot { 
			font-size: 400pt;
			text-align: center;
			font-family: arial;
			width: 40%;
			border: 1px solid #888;
			padding: 0;
		}
		.sg_slot { 
			font-size: 40pt;
			text-align: center;
			font-family: arial;
			width: 10%;
			border: 1px solid #888;
		}
		.gp_space {
			width: 7%;
			border: 1px solid #888;
			font-size: 200pt;
			text-align: center;
			font-family: "Noto Sans", sans-serif;
		}
		.sp_space {
			width: 7%;
			border: 1px solid #888;
		}
    </style>
    <body>
        <table>
			<tr>
	             <td colspan=2 class='sg_space'></td>
                <td 
                     class='sg_slot' 
                     id='sg0' 
                     onclick='incSlotSG(0);'
                     style='-webkit-user-select:none;user-select:none;' 
                     unselectable='on'
                     onselectstart='return false;' 
                     onmousedown='return false;'>
         --
                </td>
                <td 
                     class='sg_slot' 
                     id='sg1' 
                     onclick='incSlotSG(1);'
                     style='-webkit-user-select:none;user-select:none;' 
                     unselectable='on'
                     onselectstart='return false;' 
                     onmousedown='return false;'>
         --
                </td>
 <td colspan=2 class='sg_space'></td>
			</tr>
            <tr>
	             <td class='gp_space'>&#11208;</td>
                <td 
                     colspan=2
                     class='gp_slot' 
                     id='gp0' 
                     onclick='cbClickSlotGP(0);'
                     ondblclick='cbDblClickSlotGP(0);'
                     style='-webkit-user-select:none;user-select:none;' 
                     unselectable='on'
                     onselectstart='return false;' 
                     onmousedown='return false;'>
         --
                </td>
                <td 
                     colspan=2
                     class='gp_slot' 
                     id='gp1' 
                     onclick='cbClickSlotGP(1);'
                     ondblclick='cbDblClickSlotGP(1);'
                     style='-webkit-user-select:none;user-select:none;' 
                     unselectable='on'
                     onselectstart='return false;' 
                     onmousedown='return false;'>
         --
                </td>
 <td colspan=2 class='gp_space'>&#11207;</td>
            </tr>
        </table>
    </body>
    <script>
        var gamePoints = new Array(2);
        var setGames = new Array(2);
        const gamePointsStr = [0, 15, 30, 40, "V"];
        function resetGame() {
            gamePoints[0] = 0;
            gamePoints[1] = 0;
        }
        function resetSet() {
            setGames[0] = 0;
            setGames[1] = 0;
        }
        function showGamePointsSlot(slot, points=gamePoints[slot]) {
            let slotId = "gp" + slot;
			//console.log("Looking for element " + slotId);
            let ele = document.getElementById(slotId);
            if ( ! ele ) console.log("Element " + slotId + " not found.");
            ele.innerHTML = gamePointsStr[points];
        }
        function showSetGamesSlot(slot, games=setGames[slot]) {
            let slotId = "sg" + slot;
			//console.log("Looking for element " + slotId);
            let ele = document.getElementById(slotId);
            if ( ! ele ) console.log("Element " + slotId + " not found.");
            ele.innerHTML = games;
        }
        function showGamePoints() {
            showGamePointsSlot(0);
            showGamePointsSlot(1);
        }
        function showSetGames() {
            showSetGamesSlot(0);
            showSetGamesSlot(1);
        }
        function incSlotGP(slot) {
            gamePoints[slot] += 1;
            //if ( gamePoints[slot]>4 ) resetGame();
            if ( gamePoints[slot]>=4 && Math.abs(gamePoints[0]-gamePoints[1])>1 ) {
                resetGame();
				showGamePoints();
				incSlotSG(slot);
				return;
			}
			if ( gamePoints[0]==gamePoints[1] && gamePoints[0]>3 ) {
                gamePoints[0] = 3;
                gamePoints[1] = 3;
                showGamePoints();
                return;
            }
            showGamePointsSlot(slot);
        } 
        function incSlotSG(slot) {
			console.log("incSlotSG(" + slot + ")");
            setGames[slot] += 1;
			console.log("incSlotSG(" + slot + ") = " + setGames[slot]);
            //if ( gamePoints[slot]>4 ) resetGame();
            if ( setGames[slot]>=6 && Math.abs(setGames[0]-setGames[1])>1 ) {
                resetSet();
				showSetGames();
				return;
			}
            showSetGamesSlot(slot);
			console.log("incSlotSG(" + slot + ") Done");
        }
        var timerGP;
        var firingGP = false;
        function cbClickSlotGP(slot) {
			// Detect the 2nd single click event, so we can stop it
			if (firingGP) return;

			firingGP = true;
			timerGP = setTimeout(function() {
			   if ( firingGP ) incSlotGP(slot); 
			   firingGP = false;
			}, 350);
		}
        function cbDblClickSlotGP(slot) {
			firingGP = false;
			console.log('cbDblClickSlotGP(' + slot + ')');
			incSlotGP(1-slot);
			return false;
		}
        resetSet();
        showSetGames();
        resetGame();
        showGamePoints();
    </script>
</html>
